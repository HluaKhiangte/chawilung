<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chawilung | The Future Village</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

    <div class="cursor"></div>

    <div class="bg-mesh"></div>

    <nav>
        <div class="logo">CHAWILUNG<span>.</span></div>
        <div class="nav-links">
            <a href="#">Explore</a>
            <a href="#">Innovate</a>
            <a href="#">Culture</a>
        </div>
        <a href="#" class="cta-btn">Connect</a>
    </nav>

    <main>
        <section class="hero-advance">
            <div class="hero-text">
                <h1 data-aos="clip-up">Reshaping <br><span class="highlight">Village Life.</span></h1>
                <p data-aos="fade-up" data-aos-delay="200">
                    Integrating cutting-edge technology with the serene soul of Mizoram. 
                    Experience the first smart-community prototype in the hills.
                </p>
                <div class="btn-group" data-aos="fade-up" data-aos-delay="400">
                    <button class="primary-btn">Begin Journey</button>
                    <button class="secondary-btn">See the Map</button>
                </div>
            </div>

            <div class="hero-visual" data-aos="zoom-out-left">
                <div class="glass-card">
                    <div class="card-tag">Smart Village 2.0</div>
                    <div class="card-stats">
                        <span>78% Renewable Energy</span>
                        <span>100% Digital Literacy</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1200, easing: 'cubic-bezier(0.77, 0, 0.175, 1)' });

        // Custom Cursor Logic
        const cursor = document.querySelector('.cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.pageX + 'px';
            cursor.style.top = e.pageY + 'px';
        });
    </script>
    <script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
</body>
</html>
